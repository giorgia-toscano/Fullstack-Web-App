<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password OTP</title>
    <style>
        body { padding: 0; background-color: #EEEEEE; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }
        table { border-collapse: collapse; width: 100%; background-color: #EEEEEE; }
        .card { width: 100%; max-width: 600px; background-color: #FFFFFF; border-top: 4px solid #0F4C5C; border-bottom: 1px solid #CCCCCC; border-radius: 8px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08); margin: 0 auto; text-align: left; }
        .card-header { padding: 30px 40px 10px 40px; }
        .card-body { padding: 20px 40px; font-size: 16px; line-height: 24px; color: #444444; }

        /* Stile specifico per il codice OTP */
        .otp-container {
            background-color: #F8F9FA;
            border: 1px dashed #0F4C5C;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .otp-code {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #0F4C5C;
            margin: 0;
        }

        .card-footer { padding: 20px 40px; background-color: #F8F9FA; border-top: 1px solid #EEEEEE; }
        .card-footer p { margin: 0; font-size: 13px; color: #777777; line-height: 20px; }
        .footer { padding: 20px 40px; font-size: 11px; color: #999999; }
        .footer p { margin: 0; }
    </style>
</head>
<body>

<table role="presentation">
    <tr>
        <td style="padding: 40px 10px; text-align: center; vertical-align: top;">

            <table role="presentation" class="card">

                <tr>
                    <td class="card-header">
                        <h1 style="margin: 0; font-size: 18px; font-weight: bold; color: #333333;">
                            <span th:text="#{mail.reset.title}">Recupero Password</span>
                        </h1>
                    </td>
                </tr>

                <tr>
                    <td class="card-body">
                        <div style="font-weight: bold; margin-bottom: 10px;">
                            <span th:text="#{mail.reset.greeting(${firstName})}">Ciao Nome,</span>
                        </div>
                        <div th:text="#{mail.reset.instruction}">
                            Hai richiesto il reset della password. Usa il seguente codice OTP per procedere:
                        </div>

                        <div class="otp-container">
                            <h2 class="otp-code" th:text="${otp}">123456</h2>
                        </div>

                        <div style="font-size: 14px; color: #888888; font-style: italic;" th:text="#{mail.reset.expiration}">
                            Il codice scadrà tra 10 minuti.
                        </div>
                    </td>
                </tr>

                <tr>
                    <td class="card-footer">
                        <p th:text="#{mail.reset.footer}">
                            Se non hai richiesto tu questo codice, ignora questa email o contatta l'assistenza.
                        </p>
                    </td>
                </tr>

                <tr>
                    <td class="footer">
                        <p>
                            &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span>
                            <span th:text="#{mail.footer.company}">Nome Azienda</span> –
                            <span th:text="#{mail.footer.department}">Risorse Umane</span>
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
