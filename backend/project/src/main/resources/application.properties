
# ================= APPLICATION CONFIGURATION ========
spring.application.name=project

# ================= DATABASE CONFIGURATION ========
spring.datasource.url=jdbc:mysql://localhost:3306/project_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO

spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.include-stacktrace=never
logging.level.org.springframework.web=INFO


# ================= LOGGING CONFIGURATION ========
logging.level.org.springframework.security=INFO

# ================= EMAIL CONFIGURATION ========
